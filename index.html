<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MyFarmBox Singapore</title>
  <meta name="description" content="Join the MyFarmBox Singapore Founding Harvest waitlist.">
  <style>
    *{box-sizing:border-box}html,body{margin:0;background:#f7f5ee;color:#19211e;font-family:Arial,sans-serif}
    header{height:68px;background:#173d34;color:white;display:flex;align-items:center}
    .shell{width:min(1180px,calc(100% - 24px));margin:auto}.brand{display:flex;align-items:center;gap:10px}.mark{width:38px;height:38px;border:1px solid rgba(255,255,255,.25);border-radius:12px;display:grid;place-items:center;font-weight:800}.brand b,.brand small{display:block}.brand small{opacity:.65;font-size:10px}
    main{padding:18px 0 45px}.frame-wrap{width:100%;max-width:820px;margin:0 auto}
    iframe{width:100%;height:900px;border:0;border-radius:22px;display:block;background:#f7f5ee}
    footer{text-align:center;color:#6e7772;font-size:12px;padding:20px}
    @media(max-width:560px){main{padding:0}.shell{width:100%}header .shell{width:calc(100% - 24px)}iframe{border-radius:0}}
  </style>
</head>
<body>
<header>
  <div class="shell">
    <div class="brand"><div class="mark">M</div><div><b>MyFarmBox</b><small>Singapore</small></div></div>
  </div>
</header>
<main>
  <div class="frame-wrap">
    <iframe
      id="waitlistFrame"
      src="PASTE_YOUR_APPS_SCRIPT_EXEC_URL_HERE?view=waitlist"
      scrolling="no"
      loading="eager">
    </iframe>
  </div>
</main>
<footer>Fresh. Traceable. 100% Natural Produce.</footer>
<script>
  window.addEventListener("message",function(event){
    if(!event.data||event.data.type!=="waitlistHeight")return;
    var frame=document.getElementById("waitlistFrame");
    var height=Number(event.data.height||0);
    if(frame&&height>500)frame.style.height=(height+40)+"px";
  });
</script>
</body>
</html>
